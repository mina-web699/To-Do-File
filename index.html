<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="تطبيق احترافي فخم لإدارة المهام اليومية وكتابة الملاحظات، يعمل بالكامل بلا اتصال بالإنترنت وحفظ تلقائي.">
    <meta name="keywords" content="To-Do List, Notes, PWA, Offline App, JavaScript, جافا سكريبت, تطبيق مهام, مفكرة">
    <meta name="author" content="Mina Maged">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Task & Note Manager - تطبيق المهام والملاحظات الفخم">
    <meta property="og:description" content="نظّم يومك واكتب ملاحظاتك في مكان واحد، ريسبونسف ويشتغل أوفلاين.">
    <meta property="og:image" content="https://yourusername.github.io/your-repository-name/images/preview.png">
    <meta property="og:url" content="https://yourusername.github.io/your-repository-name/">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Task & Note Manager - تطبيق المهام والملاحظات الفخم">
    <meta name="twitter:description" content="نظّم يومك واكتب ملاحظاتك في مكان واحد، ريسبونسف ويشتغل أوفلاين.">
    <meta name="twitter:image" content="https://yourusername.github.io/your-repository-name/images/preview.png">

    <meta name="theme-color" content="#183630">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="./style.css">
    <title>ToDo List</title>

</head>

<body>
    <div class="container">
        <div class="content">

            <div class="hero-section">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E5C690" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                    <span>Mina's Space</span>
                </div>
                <h1>Master Your Day</h1>
                <p>نظّم مهامك اليومية واكتب ملاحظاتك بحرية، في مكان واحد وبلا حدود.</p>
            </div>

            <div class="links-of-header">
                <button class="filter-btn active" id="all-tasks">All Tasks</button>
                <button class="filter-btn" id="pending-tasks">Active</button>
                <button class="filter-btn" id="completed-tasks">Completed</button>
                <button class="filter-btn" id="notes-tab">Notes</button>
            </div>

            <div class="inputs-section">
                <input type="text" id="task-input" placeholder="Add a new task...">
                <textarea id="note-input" placeholder="Write your note here..."
                    style="display: none; width: 100%; height: 120px; resize: none;"></textarea>
                <button id="add-task-btn">Add Task</button>
            </div>

            <div class="body" id="tasks-wrapper">
                <h2>Tasks List</h2>
                <div class="tasks" id="tasks-container"></div>
            </div>

            <div class="body" id="notes-wrapper" style="display: none;">
                <h2>Notes List</h2>
                <div class="notes" id="notes-container"></div>
            </div>
        </div>

        <footer class="main-footer">
            <p>&copy; 2026 Developed with 🤎 by <span>Mina Maged</span>. All Rights Offline.</p>
        </footer>
    </div>

    <script src="./app.js"></script>
</body>

</html>
